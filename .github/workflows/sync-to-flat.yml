name: Sync Docker Images to Private Registry (Flat Sync)
run-name: Images - ${{ inputs.source_images }}

on:
  workflow_dispatch:
    inputs:
      source_images:
        description: "Source images (comma-separated, e.g. docker.io/golang:1.26.2-bookworm,docker.io/nginx:1.27)"
        required: true
        default: "docker.io/golang:1.26.2-bookworm"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Private Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.FLAT_PRIVATE_REGISTRY }}
          username: ${{ secrets.FLAT_DOCKER_USER }}
          password: ${{ secrets.FLAT_DOCKER_TOKEN }}

      - name: 🚀 Sync Images (Parallel)
        run: |
          IMAGES="${{ github.event.inputs.source_images }}"
          
          sync_image() {
            SRC="$1"
            TRIM_NAME="$(echo "${SRC}" | sed -E 's;/;_;g')"
            DEST="${{ secrets.FLAT_BASE_URL }}/${TRIM_NAME}"

            echo ">>> Syncing: $SRC -> $DEST"

            skopeo copy --all --src-tls-verify=true --dest-tls-verify=true \
              --dest-creds "${{ secrets.FLAT_DOCKER_USER }}:${{ secrets.FLAT_DOCKER_TOKEN }}" \
              "docker://$SRC" \
              "docker://$DEST"

            echo ">>> Done: $SRC"
          }
          export -f sync_image

          echo "$IMAGES" | tr ',' '\n' | xargs -n1 -P3 -I{} bash -c 'sync_image "$@"' _ {}
