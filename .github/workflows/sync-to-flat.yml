name: Sync Docker Images to Private Registry (Flat Sync)
run-name: Image - ${{ inputs.source_image }}

on:
  workflow_dispatch:
    inputs:
      source_image:
        description: "Source image (e.g. docker.io/golang:1.26.2-bookworm)"
        required: true
        default: "docker.io/golang:1.26.2-bookworm"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Sync Image
        run: |
          SRC="${{ github.event.inputs.source_image }}"
          TRIM_NAME="$(echo ${SRC} | sed -E 's;/;_;g')"
          DEST="${{ secrets.FLAT_PRIVATE_REGISTRY }}/${TRIM_NAME}"

          echo "Starting sync: $SRC -> $DEST"
          
          docker run --rm \
            quay.io/skopeo/stable:latest \
            copy \
            --all \
            --src-tls-verify=true \
            --dest-tls-verify=true \
            --dest-creds "${{ secrets.FLAT_DOCKER_USER }}:${{ secrets.FLAT_DOCKER_TOKEN }}" \
            "docker://$SRC" \
            "docker://$DEST"

          if [ $? -gt 0 ]; then

            echo "⚠️ skopeo failed, fallback to regctl..."

            docker run --rm \
              regclient/regctl:latest \
              image copy \
              --recursive \
              --format docker \
              --user "${{ secrets.FLAT_DOCKER_USER }}:${{ secrets.FLAT_DOCKER_TOKEN }}" \
              "$SRC" \
              "$DEST"
          fi

      - name: ✅ Done
        run: |
          echo "Image synced successfully to Private Registry."
